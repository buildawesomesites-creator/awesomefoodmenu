<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        const redirectUrl = "user-menu.html";

        window.location.replace(redirectUrl);

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("redirectLink").href = redirectUrl;
        });
    </script>
</head>
<body>
    <p>If you are not redirected automatically, please <a id="redirectLink" href="#">click here</a>.</p>
</body>
</html>
