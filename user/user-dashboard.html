<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        body { 
            background: #f8f9fa; 
            margin: 0; 
            padding-top: 130px; /* Adjust based on your header height */
            padding-bottom: 120px; 
            opacity: 0; 
            transition: opacity 0.3s ease; 
        }
        .container { max-width: 500px; margin: auto; padding: 0 20px; }
        h2 { color: #1c1e21; margin-bottom: 20px; }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .btn-action {
            padding: 20px; border: none; border-radius: 16px;
            font-weight: 900; text-align: center; text-decoration: none;
            display: flex; flex-direction: column; align-items: center;
            gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer; color: #333; background: #fff;
        }
        .btn-action span { font-size: 30px; }
    </style>
</head>
<body>

    <div id="header-container"></div>
    <div id="footer-container"></div>

    <div class="container">
        <h2>My Dashboard</h2>
        
        <div class="action-grid">
            <button class="btn-action" onclick="location.href='user-profile.html'">
                <span>👤</span> Profile
            </button>
            <button class="btn-action" onclick="location.href='user-order.html'">
                <span>📦</span> My Orders
            </button>
            <button class="btn-action" onclick="location.href='user-change-password.html'">
                <span>🔑</span> Change Password 
            </button>
        </div>
    </div>

    <script type="module">
        import { initAuth } from "./user-guard.js";
        import { injectHeader } from "./user-header.js";
        import { injectFooter } from "./user-footer.js";

        initAuth(true, async (user, userData) => {
            // Inject header and footer components
            injectHeader(userData);
            injectFooter('dashboard'); 
            
            // Show content after loading components
            document.body.style.opacity = "1";
        });
    </script>
</body>
</html>
