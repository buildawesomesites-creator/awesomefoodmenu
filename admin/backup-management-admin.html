<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin System Backup</title>
    <link rel="stylesheet" href="headerandfooter.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #f4f4f9; margin: 0; padding-bottom: 50px; }
        /* Increased padding-top further */
        .container { width: 100%; max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; padding: 300px 20px 40px; }
        
        .fixed-controls { position: fixed; top: 60px; left: 0; right: 0; background: white; padding: 20px 20px 0 20px; border-bottom: 1px solid #eee; z-index: 10; max-width: 600px; margin: 0 auto; }
        
        #progress-container { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-top: 15px; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #ff3e3e; transition: width 0.3s; }
        
        .timestamp-display { font-size: 14px; color: #333; margin-top: 8px; text-align: center; font-weight: 700; background: white; padding-bottom: 10px; }
        
        /* Adjusted top position for sticky header to match new padding */
        .system-header { margin-top: 0; color: #000; font-size: 22px; font-weight: 900; position: sticky; top: 275px; background: white; padding: 15px 0; z-index: 5; margin-bottom: 20px; }
        
        .btn-action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-action { width: 100%; padding: 14px 5px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; text-align: center; transition: opacity .2s; }
        .btn-action:disabled { opacity: .6; cursor: not-allowed; }
        
        .tabs-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; margin-top: 0; }
        .tab-btn { padding: 20px 10px; border: 2px solid #ddd; background: #fff; border-radius: 18px; font-weight: 900; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 110px; }
        .tab-btn span.label-main { font-size: 16px; margin-bottom: 4px; text-transform: capitalize; }
        .tab-btn span.count-sub { font-size: 14px; color: #666; font-weight: 700; margin-top: 5px; }
    </style>
</head>
<body>

<div id="header-container"></div>

<div class="container">
    <div class="fixed-controls">
        <h2 style="margin:0 0 10px 0;">System Backup</h2>
        <div class="btn-action-grid">
            <button id="saveToCloudBtn" class="btn-action" style="background:#007bff;">CLOUD BACKUP</button>
            <button id="restoreFromCloudBtn" class="btn-action" style="background:#28a745;">RESTORE FROM CLOUD</button>
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="last-updated" class="timestamp-display">Loading last backup time...</div>
        <h3 class="system-header">System Collections Overview</h3>
    </div>

    <div id="tab-container" class="tabs-grid"></div>
</div>

<div id="footer-container"></div>

<script type="module">
    import { injectHeader } from "./master-header.js";
    import { injectFooter } from "./master-footer.js";
    import { auth, db } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { doc, onSnapshot, getDocs, setDoc, deleteDoc, collection, doc as firestoreDoc, getCountFromServer, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    function updateProgress(percent) {
        const container = document.getElementById("progress-container");
        const bar = document.getElementById("progress-bar");
        container.style.display = percent > 0 ? "block" : "none";
        bar.style.width = percent + "%";
    }

    async function fetchLatestTimestamp() {
        const snap = await getDoc(firestoreDoc(db, "backups", "latest"));
        const display = document.getElementById("last-updated");
        if (snap.exists()) {
            const date = new Date(snap.data().updatedAt);
            display.innerText = "Last Backup: " + date.toLocaleString();
        } else {
            display.innerText = "No backups found.";
        }
    }

    async function init() {
        await Promise.all([injectHeader(), injectFooter("admin")]);
        onAuthStateChanged(auth, user => { if (!user) window.location.href = "admin-login.html"; });
        fetchLatestTimestamp();
    }
    init();

    let activeCollections = [];

    onSnapshot(doc(db, "metacollection", "config"), snap => {
        if (!snap.exists()) return;
        activeCollections = (snap.data().collections || []).sort((a, b) => a.label.localeCompare(b.label));
        renderUI();
    });

    function capitalizeFirstLetter(text) { return text.charAt(0).toUpperCase() + text.slice(1); }

    async function renderUI() {
        const tabContainer = document.getElementById("tab-container");
        tabContainer.innerHTML = "";
        for (const col of activeCollections) {
            const countSnap = await getCountFromServer(collection(db, col.id));
            const btn = document.createElement("div");
            btn.className = "tab-btn";
            btn.innerHTML = `<span class="label-main">${capitalizeFirstLetter(col.label)}</span><span class="count-sub">(${countSnap.data().count} items)</span>`;
            tabContainer.appendChild(btn);
        }
    }

    document.getElementById("saveToCloudBtn").onclick = async function () {
        const btn = this;
        btn.disabled = true;
        try {
            const CHUNK_SIZE = 50;
            const totalCols = activeCollections.length;
            const existing = await getDocs(collection(db, "backups"));
            for (const d of existing.docs) { await deleteDoc(d.ref); }
            
            for (let i = 0; i < totalCols; i++) {
                updateProgress(((i / totalCols) * 100));
                btn.innerText = `SAVING...`;
                const snap = await getDocs(collection(db, activeCollections[i].id));
                const records = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const totalChunks = Math.max(1, Math.ceil(records.length / CHUNK_SIZE));
                for (let chunk = 0; chunk < totalChunks; chunk++) {
                    const chunkData = records.slice(chunk * CHUNK_SIZE, (chunk + 1) * CHUNK_SIZE);
                    await setDoc(firestoreDoc(db, "backups", `${activeCollections[i].id}_chunk_${chunk}`), { collection: activeCollections[i].id, chunk, totalChunks, recordCount: chunkData.length, data: chunkData });
                }
            }
            await setDoc(firestoreDoc(db, "backups", "latest"), { updatedAt: new Date().toISOString(), collections: activeCollections.length, chunkSize: CHUNK_SIZE });
            updateProgress(100);
            btn.innerText = "SUCCESS!";
            fetchLatestTimestamp();
            setTimeout(() => { btn.innerText = "CLOUD BACKUP"; btn.disabled = false; updateProgress(0); }, 2000);
        } catch (e) { alert("Error: " + e.message); btn.innerText = "CLOUD BACKUP"; btn.disabled = false; updateProgress(0); }
    };

    document.getElementById("restoreFromCloudBtn").onclick = async function () {
        if (!confirm("⚠️ DANGER: Overwrite database?")) return;
        const btn = this;
        btn.disabled = true;
        try {
            const allBackups = await getDocs(collection(db, "backups"));
            const chunks = allBackups.docs.filter(d => d.id !== "latest");
            for (let i = 0; i < chunks.length; i++) {
                updateProgress(((i / chunks.length) * 100));
                const { collection: targetCol, data: items } = chunks[i].data();
                let batch = writeBatch(db);
                for (let j = 0; j < items.length; j++) {
                    const { id, ...itemData } = items[j];
                    batch.set(firestoreDoc(db, targetCol, id), itemData);
                }
                await batch.commit();
            }
            updateProgress(100);
            btn.innerText = "RESTORED!";
            location.reload();
        } catch (e) { alert("Restore Error: " + e.message); btn.innerText = "RESTORE FROM CLOUD"; btn.disabled = false; updateProgress(0); }
    };
</script>
</body>
</html>
