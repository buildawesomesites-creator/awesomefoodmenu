<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        :root { --primary: #28a745; --danger: #dc3545; --bg: #f8f9fa; --info: #007bff; --warning: #ffc107; }
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { margin: 0; background: var(--bg); padding-top: 90px; padding-bottom: 100px; }
        .dashboard-container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .search-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 12px 40px 12px 12px; border: 1.5px solid #ddd; border-radius: 12px; }
        .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #eee; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .action-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-select-all { padding: 10px; background: #6c757d; color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .btn-delete-all { flex: 1; padding: 10px; background: var(--danger); color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; display: none; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #fff; border-radius: 12px; cursor: pointer; font-weight: 900; border: 1px solid #eee; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .order-card { background: #fff; border: 1px solid #eee; padding: 16px; margin-bottom: 16px; border-radius: 16px; display: flex; gap: 12px; align-items: flex-start; }
        .select-checkbox { transform: scale(1.5); cursor: pointer; margin-top: 5px; }
        
        .order-meta-info { font-weight: 900; font-size: 1.1em; color: #000; margin-bottom: 6px; }
        .customer-info { font-size: 1em; color: #333; margin: 15px 0; padding: 12px; background: #f4f4f4; border-radius: 8px; line-height: 1.6; }
        .product-item { display: flex; align-items: center; gap: 16px; margin: 12px 0; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
        .product-img { width: 65px; height: 65px; object-fit: cover; border-radius: 10px; flex-shrink: 0; }
        
        .discount-info { font-weight: 900; margin-top: 12px; border-top: 2px solid #eee; padding-top: 10px; font-size: 1em; }
        .text-red { color: var(--danger); font-weight: 900; }
        .text-green { color: var(--primary); font-weight: 900; }
        
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; text-decoration: none; display: block; text-align: center; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="search-wrapper">
            <input type="text" id="search-input" class="search-box" placeholder="Search orders..." oninput="window.applyFilter()">
            <button class="clear-btn" onclick="window.clearSearch()">×</button>
        </div>
        
        <div class="action-bar">
            <button class="btn-select-all" onclick="window.toggleSelectAll()">Select All</button>
            <button id="delete-btn" class="btn-delete-all" onclick="window.deleteSelected()">Delete Selected</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="window.switchTab('pending', this)">Pending</button>
            <button class="tab-btn" onclick="window.switchTab('success', this)">Success</button>
        </div>
        
        <div id="total-count" style="font-weight:900; margin-bottom:10px; color:#555;"></div>
        <div id="order-history">Loading orders...</div>
    </div>

<script type="module">
    import { injectHeader } from "./master-header.js";
    import { injectFooter } from "./master-footer.js";
    import { db } from "./firebase-config.js";
    import { DB_FIELDS, getFullImageUrl } from "./globaldata.js";
    import { collection, getDocs, doc, updateDoc, getDoc, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    injectHeader();
    injectFooter('dashboard');

    let allOrders = [];
    let filteredOrders = [];
    let selectedIds = new Set();
    let currentStatus = 'pending';
    let shopCurrency = "$";

    const O = DB_FIELDS.ORDERS.FIELDS;

    function formatDateTime(dateInput) {
        if (!dateInput) return 'N/A';
        const d = dateInput.toDate ? dateInput.toDate() : new Date(dateInput);
        return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')} , ${(d.getDate()).toString().padStart(2, '0')}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getFullYear()}`;
    }

    window.clearSearch = () => { document.getElementById("search-input").value = ""; window.applyFilter(); };
    window.switchTab = (status, btn) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStatus = status;
        selectedIds.clear();
        window.applyFilter();
    };

    window.toggleSelectAll = () => {
        const allSelected = filteredOrders.length > 0 && filteredOrders.every(o => selectedIds.has(o.id));
        filteredOrders.forEach(o => allSelected ? selectedIds.delete(o.id) : selectedIds.add(o.id));
        renderList(filteredOrders);
    };

    window.toggleSelect = (id) => {
        selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
        renderList(filteredOrders);
    };

    window.deleteSelected = async () => {
        if (selectedIds.size === 0) return;
        if (!confirm(`Delete ${selectedIds.size} order(s)?`)) return;
        try {
            const batch = writeBatch(db);
            selectedIds.forEach(id => batch.delete(doc(db, DB_FIELDS.ORDERS.COLLECTION, id)));
            await batch.commit();
            location.reload();
        } catch (e) { alert("Error: " + e.message); }
    };

    window.applyFilter = () => {
        const term = document.getElementById("search-input").value.toLowerCase();
        filteredOrders = allOrders.filter(o => {
            const matchesStatus = (o[O.STATUS] || 'pending') === currentStatus;
            const c = o[O.CUSTOMER] || {};
            const text = [o[O.ORDER_ID], o[O.INVOICE_NUMBER], o[O.USER_EMAIL], c.name, c.uid, c.phone].join(" ").toLowerCase();
            return matchesStatus && text.includes(term);
        });
        renderList(filteredOrders);
    };

    function renderList(list) {
        const container = document.getElementById("order-history");
        document.getElementById("total-count").innerText = `Total: ${list.length}`;
        document.getElementById('delete-btn').style.display = selectedIds.size > 0 ? 'block' : 'none';

        if (list.length === 0) { container.innerHTML = "<p>No orders found.</p>"; return; }

        container.innerHTML = list.map(o => {
            const c = o[O.CUSTOMER] || {};
            const items = o[O.ITEMS] || [];
            const couponObj = o[O.COUPON];
            const hasCoupon = couponObj && typeof couponObj === 'object' && couponObj.code;
            
            return `
            <div class="order-card">
                <input type="checkbox" class="select-checkbox" ${selectedIds.has(o.id) ? 'checked' : ''} onchange="window.toggleSelect('${o.id}')">
                <div style="flex:1">
                    <div class="order-meta-info">Order ID: ${o[O.ORDER_ID] || 'N/A'}</div>
                    <div class="order-meta-info">Invoice #: ${o[O.INVOICE_NUMBER] || 'N/A'}</div>
                    <div class="order-meta-info">Date: ${formatDateTime(o[O.CREATED_AT])}</div>
                    
                    <div class="customer-info">
                        <b>Name:</b> ${c.name || 'N/A'}<br>
                        <b>Email:</b> ${o[O.USER_EMAIL] || 'N/A'}<br>
                        <b>Phone:</b> ${c.phone || 'N/A'}<br>
                        <b>Address:</b> ${c.address || 'N/A'}, ${c.city || 'N/A'}
                    </div>

                    <div>${items.map(i => `
                        <div class="product-item">
                            <img src="${getFullImageUrl(i.image || '')}" class="product-img" onerror="this.style.display='none'">
                            <div>
                                <b>${i.qty || 1} x ${i.title || 'Item'}</b><br>
                                ${Number(i.price || 0).toLocaleString()} ${shopCurrency}
                            </div>
                        </div>`).join('')}
                    </div>
                    
                    <div class="discount-info">
                        <div>Subtotal: ${Number(o[O.SUBTOTAL] || 0).toLocaleString()} ${shopCurrency}</div>
                        ${hasCoupon ? `<div class="text-red">Coupon (${couponObj.code}): -${Number(o[O.DISCOUNT] || 0).toLocaleString()} ${shopCurrency}</div>` : 
                                      (Number(o[O.DISCOUNT] || 0) > 0 ? `<div class="text-red">Discount: -${Number(o[O.DISCOUNT]).toLocaleString()} ${shopCurrency}</div>` : '')}
                        <div>Net Amount: ${Number(o[O.NET_AMOUNT] || 0).toLocaleString()} ${shopCurrency}</div>
                        <div class="text-green">VAT (${o[O.VAT_PERCENT] || 0}%): +${Number(o[O.VAT_AMOUNT] || 0).toLocaleString()} ${shopCurrency}</div>
                        <div style="font-size: 1.2em; margin-top:10px;">Total: ${Number(o[O.TOTAL] || 0).toLocaleString()} ${shopCurrency}</div>
                    </div>
                    
                    <button class="btn-action" style="background:${currentStatus === 'pending' ? '#28a745' : '#ffc107'}; color:white;" 
                        onclick="window.updateStatus('${o.id}', '${currentStatus === 'pending' ? 'success' : 'pending'}')">
                        ${currentStatus === 'pending' ? 'Mark Success' : 'Back to Pending'}
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    window.updateStatus = async (id, status) => {
        await updateDoc(doc(db, DB_FIELDS.ORDERS.COLLECTION, id), { [O.STATUS]: status, [O.INVOICE_DATE]: new Date() });
        location.reload();
    };

    async function load() {
        const snap = await getDocs(query(collection(db, DB_FIELDS.ORDERS.COLLECTION), orderBy(O.CREATED_AT, "desc")));
        allOrders = snap.docs.map(d => ({ ...d.data(), id: d.id }));
        const shopSnap = await getDoc(doc(db, DB_FIELDS.SETTINGS.COLLECTION, DB_FIELDS.SETTINGS.DOC_SHOP));
        if (shopSnap.exists()) shopCurrency = shopSnap.data()[DB_FIELDS.SETTINGS.ACTIVE_CURRENCY]?.symbol || "$";
        window.applyFilter();
    }
    load();
</script>
</body>
</html>
