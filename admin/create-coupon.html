<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coupon Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700;900&display=swap');
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background: #f9f9f9; padding: 80px 20px 100px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btn-save { width: 100%; padding: 18px; border: none; border-radius: 12px; background: #845ef7; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .coupon-count { font-weight: 900; color: #845ef7; margin-bottom: 10px; font-size: 18px; text-align: center; }
        
        .coupon-item { background:#fff; border-radius:14px; padding:16px; margin-bottom:12px; border:1px solid #ececec; box-shadow:0 2px 8px rgba(0,0,0,.05); }
        .coupon-top { display:flex; align-items:flex-start; gap:12px; }
        .coupon-check { width:22px; height:22px; margin-top:4px; }
        .coupon-info { flex:1; min-width:0; }
        .coupon-code { font-size:20px; font-weight:700; color:#222; word-break:break-word; }
        .coupon-meta { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
        
        .badge { display:inline-flex; align-items:center; padding:6px 14px; border-radius:30px; font-size:14px; font-weight:700; }
        .badge.value { background:#eef6ff; color:#1877f2; }
        .badge.type { background:#f4ecff; color:#7b3ff2; }
        .badge.expiry { background:#fff3e6; color:#d97706; }
        
        .coupon-bottom { display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding-top:14px; border-top:1px solid #eee; gap:10px; }
        .actions { display:flex; gap:10px; }
        
        .btn-pill { border:none; border-radius:30px; padding:10px 20px; font-size:15px; font-weight:700; cursor:pointer; min-width:80px; }
        .btn-edit { background:#4dabf7; color:#fff; }
        .btn-delete { background:#ff4d4f; color:#fff; }

        @media(max-width:420px){
            .coupon-code { font-size:18px; }
            .btn-pill { padding:9px 16px; font-size:14px; }
        }

        .bulk-actions { background: #eee; padding: 10px; border-radius: 12px; margin-bottom: 10px; display: none; justify-content: space-between; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 24px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(20px); }
        #modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:1000; }
    </style>
</head>
<body>

    <div id="header-container"></div>
    
    <div class="container">
        <div class="card">
            <h2>Create New Coupon</h2>
            <div class="form-group"><input type="text" id="coupon-code" placeholder="Coupon Code (e.g. SAVE20)"></div>
            <div class="form-group"><input type="number" id="coupon-value" placeholder="Value"></div>
            <div class="form-group">
                <select id="coupon-type">
                    <option value="fixed">Fixed Amount</option>
                    <option value="percent">Percentage (%)</option>
                </select>
            </div>
            <div class="form-group"><label>Expiry Date</label><input type="date" id="coupon-expiry"></div>
            <button class="btn-save" onclick="saveCoupon()">Save Coupon</button>
        </div>

        <div id="bulk-actions" class="bulk-actions">
            <button class="btn-pill" onclick="batchUpdate(true)">Active</button>
            <button class="btn-pill" onclick="batchUpdate(false)">Inactive</button>
            <button class="btn-pill" style="background:#fa5252; color:white;" onclick="batchDelete()">Delete Selected</button>
        </div>

        <div id="total-coupons" class="coupon-count"></div>
        <div id="coupon-list"></div>
    </div>

    <div id="footer-container"></div>

    <div id="modal-overlay">
        <div class="card" style="width: 90%; max-width: 400px;">
            <h3>Edit Coupon</h3>
            <input type="hidden" id="edit-id">
            <div class="form-group"><label>Value</label><input type="number" id="edit-value"></div>
            <div class="form-group"><label>Expiry Date</label><input type="date" id="edit-expiry"></div>
            <div class="form-group"><label>Type</label><select id="edit-type"><option value="fixed">Fixed</option><option value="percent">Percent</option></select></div>
            <button class="btn-save" onclick="updateCoupon()">Update</button>
            <button onclick="document.getElementById('modal-overlay').style.display='none'" style="margin-top:10px; width:100%; padding:15px; border:none; background:#eee; border-radius:12px; font-weight:bold;">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { injectHeader } from "./master-header.js";
        import { injectFooter } from "./master-footer.js";
        import { db, auth } from "./firebase-config.js";
        import { doc, setDoc, getDocs, collection, deleteDoc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { DB_FIELDS } from "./globaldata.js";

        injectHeader();
        injectFooter('products'); 

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "admin-login.html"; else fetchCoupons(); });

        window.saveCoupon = async () => {
            const F = DB_FIELDS.COUPONS.FIELDS;
            const code = document.getElementById("coupon-code").value.toUpperCase().trim();
            const value = parseFloat(document.getElementById("coupon-value").value);
            const type = document.getElementById("coupon-type").value;
            const expiry = document.getElementById("coupon-expiry").value;
            
            if (!code || isNaN(value) || !expiry) return alert("Fill all fields");
            
            try {
                await setDoc(doc(db, DB_FIELDS.COUPONS.COLLECTION, code), { 
                    [F.CODE]: code, [F.VALUE]: value, [F.TYPE]: type, [F.ACTIVE]: true, expiryDate: expiry, createdAt: new Date().toISOString() 
                });
                document.getElementById("coupon-code").value = "";
                fetchCoupons();
            } catch (error) { alert("Error: " + error.message); }
        };

        async function fetchCoupons() {
            const snap = await getDocs(collection(db, DB_FIELDS.COUPONS.COLLECTION));
            const list = document.getElementById("coupon-list");
            list.innerHTML = "";
            let count = 0;
            snap.forEach(d => {
                count++;
                const c = d.data();
                const div = document.createElement("div");
                div.className = "coupon-item";
                div.innerHTML = `
                    <div class="coupon-top">
                        <input class="coupon-check" type="checkbox" value="${c.code}">
                        <div class="coupon-info">
                            <div class="coupon-code">${c.code}</div>
                            <div class="coupon-meta">
                                <span class="badge value">${c.type==="percent" ? c.value+"%" : "$"+c.value}</span>
                                <span class="badge type">${c.type==="percent" ? "Percentage" : "Fixed"}</span>
                                <span class="badge expiry">📅 ${c.expiryDate || "No Expiry"}</span>
                            </div>
                        </div>
                    </div>
                    <div class="coupon-bottom">
                        <label class="switch">
                            <input type="checkbox" ${c.active ? "checked" : ""} onchange="toggleActive('${c.code}',this.checked)">
                            <span class="slider"></span>
                        </label>
                        <div class="actions">
                            <button class="btn-pill btn-edit" onclick="window.openEdit('${c.code}',${c.value},'${c.type}','${c.expiryDate}')">Edit</button>
                            <button class="btn-pill btn-delete" onclick="deleteSingleCoupon('${c.code}')">Delete</button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById("total-coupons").textContent = `Total Coupons: ${count}`;
            document.querySelectorAll('.coupon-check').forEach(chk => chk.onchange = updateBulkBar);
        }

        function updateBulkBar() {
            const checked = document.querySelectorAll('.coupon-check:checked');
            document.getElementById('bulk-actions').style.display = checked.length ? 'flex' : 'none';
        }

        window.toggleActive = async (id, status) => {
            await updateDoc(doc(db, DB_FIELDS.COUPONS.COLLECTION, id), { active: status });
        };

        window.deleteSingleCoupon = async (id) => {
            if (confirm("Delete this coupon?")) {
                await deleteDoc(doc(db, DB_FIELDS.COUPONS.COLLECTION, id));
                fetchCoupons();
            }
        };

        window.batchUpdate = async (status) => {
            const batch = writeBatch(db);
            document.querySelectorAll('.coupon-check:checked').forEach(chk => {
                batch.update(doc(db, DB_FIELDS.COUPONS.COLLECTION, chk.value), { active: status });
            });
            await batch.commit();
            fetchCoupons();
        };

        window.batchDelete = async () => {
            if (!confirm("Delete selected coupons?")) return;
            const batch = writeBatch(db);
            document.querySelectorAll('.coupon-check:checked').forEach(chk => {
                batch.delete(doc(db, DB_FIELDS.COUPONS.COLLECTION, chk.value));
            });
            await batch.commit();
            fetchCoupons();
        };

        window.openEdit = (code, val, type, expiry) => {
            document.getElementById('edit-id').value = code;
            document.getElementById('edit-value').value = val;
            document.getElementById('edit-type').value = type;
            document.getElementById('edit-expiry').value = expiry;
            document.getElementById('modal-overlay').style.display = 'flex';
        };

        window.updateCoupon = async () => {
            const id = document.getElementById('edit-id').value;
            const val = parseFloat(document.getElementById('edit-value').value);
            const type = document.getElementById('edit-type').value;
            const expiry = document.getElementById('edit-expiry').value;
            await updateDoc(doc(db, DB_FIELDS.COUPONS.COLLECTION, id), { value: val, type: type, expiryDate: expiry, active: true });
            document.getElementById('modal-overlay').style.display = 'none';
            fetchCoupons();
        };
    </script>
</body>
</html>
